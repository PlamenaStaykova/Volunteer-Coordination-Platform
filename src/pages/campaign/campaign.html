<main class="page page-campaign">
  <div class="container page-inner">
    <section id="campaignDetail" class="campaign-detail" hidden>
      <p class="campaign-back-link"><a href="/dashboard">Back to Dashboard</a></p>
      <h1 id="campaignTitle"></h1>
      <p id="campaignOrg" class="campaign-detail-meta"></p>
      <p id="campaignLocation" class="campaign-detail-meta"></p>
      <p id="campaignDates" class="campaign-detail-meta"></p>
      <p id="campaignDescription" class="campaign-description"></p>
      <div class="campaign-detail-metrics">
        <p><strong>Max Volunteers:</strong> <span id="campaignMaxVolunteers"></span></p>
        <p><strong>Vacancies:</strong> <span id="campaignVacancies"></span></p>
      </div>
    </section>

    <section id="campaignMissing" class="campaign-missing" hidden>
      <h1>Campaign Not Found</h1>
      <p>The requested campaign does not exist or is not available.</p>
      <a class="btn" href="/dashboard">Go to Dashboard</a>
    </section>
  </div>
</main>
