<main class="page page-auth">
  <div class="container page-inner">
    <section class="auth-section">
      <div class="auth-card">
        <div class="auth-tabs" role="tablist" aria-label="Authentication tabs">
          <button id="authLoginTab" class="auth-tab is-active" type="button" role="tab" aria-selected="true">
            Log In
          </button>
          <button id="authRegisterTab" class="auth-tab" type="button" role="tab" aria-selected="false">
            Register
          </button>
        </div>

        <h1 id="authTitle">Log In</h1>
        <p id="authSubtitle" class="auth-subtitle">Log in with your account to continue.</p>

        <form id="unifiedLoginForm" class="auth-form">
          <div class="form-group">
            <label for="authLoginEmail">Email Address</label>
            <input id="authLoginEmail" type="email" name="email" placeholder="your@email.com" required />
            <span id="authLoginEmailError" class="form-error"></span>
          </div>
          <div class="form-group">
            <label for="authLoginPassword">Password</label>
            <input id="authLoginPassword" type="password" name="password" placeholder="Enter your password" required />
            <span id="authLoginPasswordError" class="form-error"></span>
          </div>
          <button id="authLoginButton" class="btn btn-primary" type="submit">Log In</button>
        </form>

        <form id="unifiedRegisterForm" class="auth-form" hidden>
          <div class="form-group">
            <label for="authRegisterEmail">Email Address</label>
            <input id="authRegisterEmail" type="email" name="email" placeholder="your@email.com" required />
            <span id="authRegisterEmailError" class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="authRegisterPassword">Password</label>
            <input id="authRegisterPassword" type="password" name="password" placeholder="At least 6 characters" minlength="6" required />
            <span id="authRegisterPasswordError" class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="authRegisterPasswordConfirm">Confirm Password</label>
            <input id="authRegisterPasswordConfirm" type="password" name="passwordConfirm" placeholder="Confirm your password" required />
            <span id="authRegisterPasswordConfirmError" class="form-error"></span>
          </div>

          <fieldset class="role-fieldset">
            <legend>Role</legend>
            <label class="role-option">
              <input type="radio" name="registerRole" value="organizer" required />
              <span>Organizer</span>
            </label>
            <label class="role-option">
              <input type="radio" name="registerRole" value="volunteer" required />
              <span>Volunteer</span>
            </label>
            <span id="authRegisterRoleError" class="form-error"></span>
          </fieldset>

          <button id="authRegisterButton" class="btn btn-primary" type="submit">Create Account</button>
        </form>

        <div id="authUnifiedMessage" class="form-feedback" role="alert" aria-live="polite"></div>
      </div>
    </section>
  </div>
</main>
