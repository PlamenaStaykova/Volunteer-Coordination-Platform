<main class="page page-register">
  <div class="container page-inner">
    <section class="auth-section">
      <div class="auth-card">
        <h1 id="registerTitle">Create Account</h1>
        <p class="auth-subtitle" id="registerSubtitle">Join our volunteer community and start making a difference today.</p>

        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label for="registerEmail">Email Address</label>
            <input
              type="email"
              id="registerEmail"
              name="email"
              placeholder="your@email.com"
              required
              aria-required="true"
            />
            <span class="form-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="registerPassword">Password</label>
            <input
              type="password"
              id="registerPassword"
              name="password"
              placeholder="At least 6 characters"
              minlength="6"
              required
              aria-required="true"
            />
            <span class="form-error" id="passwordError"></span>
            <small>Password must be at least 6 characters long</small>
          </div>

          <div class="form-group">
            <label for="registerPasswordConfirm">Confirm Password</label>
            <input
              type="password"
              id="registerPasswordConfirm"
              name="passwordConfirm"
              placeholder="Confirm your password"
              required
              aria-required="true"
            />
            <span class="form-error" id="passwordConfirmError"></span>
          </div>

          <div class="form-feedback" id="authError" role="alert" aria-live="polite"></div>

          <button type="submit" class="btn btn-primary" id="registerButton">Create Account</button>
        </form>

        <p class="auth-footer" id="registerFooter">
          Already have an account? <a id="registerLoginLink" href="/login">Log in here</a>
        </p>
      </div>
    </section>
  </div>
</main>
