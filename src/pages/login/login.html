<main class="page page-login">
  <div class="container page-inner">
    <section class="auth-section">
      <div class="auth-card">
        <h1 id="loginTitle">Log In</h1>
        <p class="auth-subtitle" id="loginSubtitle">Welcome back! Log in to your volunteer account.</p>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input
              type="email"
              id="loginEmail"
              name="email"
              placeholder="your@email.com"
              required
              aria-required="true"
            />
            <span class="form-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
              type="password"
              id="loginPassword"
              name="password"
              placeholder="Enter your password"
              required
              aria-required="true"
            />
            <span class="form-error" id="passwordError"></span>
          </div>

          <div class="form-feedback" id="authError" role="alert" aria-live="polite"></div>

          <button type="submit" class="btn btn-primary" id="loginButton">Log In</button>
        </form>

        <p class="auth-footer" id="loginFooter">
          Don't have an account? <a id="loginRegisterLink" href="/register">Create one here</a>
        </p>
      </div>
    </section>
  </div>
</main>
