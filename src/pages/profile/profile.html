<main class="page page-profile">
  <div class="container page-inner">
    <section class="profile-panel" aria-label="Profile details">
      <p class="profile-back-link"><a href="/dashboard">Back to Dashboard</a></p>
      <div class="profile-panel-header">
        <h1>My Profile</h1>
        <p>Keep your contact details up to date for campaign coordination.</p>
      </div>
      <form id="profileForm" class="profile-form">
        <label>
          First Name
          <input id="profileFirstName" type="text" required />
        </label>
        <label>
          Last Name
          <input id="profileLastName" type="text" required />
        </label>
        <label>
          Email
          <input id="profileEmail" type="email" required />
        </label>
        <label>
          Phone
          <input id="profilePhone" type="tel" />
        </label>
        <div id="volunteerSkillsFields" class="profile-form-row volunteer-skills-fields" hidden>
          <p class="skills-title">Skills</p>
          <p id="selectedSkillsLine" class="skills-selected-line">Selected: None</p>
          <div id="selectedSkillsEditor" class="selected-skills-editor" aria-label="Selected skills" hidden></div>
          <p class="skills-help">Select your volunteer skills (up to 10):</p>
          <div id="profileSkillsGrid" class="skills-grid"></div>
        </div>
        <div id="organizerProfileFields" class="profile-form-row profile-organizer-fields" hidden>
          <label>
            Organization Name
            <input id="profileOrganizationName" type="text" />
          </label>
          <label>
            Campaign Manager
            <input id="profileCampaignManager" type="text" />
          </label>
        </div>
        <button class="btn profile-save-btn" type="submit">Save Profile</button>
      </form>
      <p id="profileMessage" class="inline-message" hidden></p>
    </section>
  </div>
</main>
